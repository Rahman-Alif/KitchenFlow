services:
  postgres:
    image: postgres:16
    container_name: kitchenflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kitchenflow_backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
    env_file:
      - ./backend/.env

  nginx:
    image: nginx:alpine
    container_name: kitchenflow_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    image: node:20-alpine
    container_name: kitchenflow_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend

  # ── AI Features ──────────────────────────────────────────
  ai_features:
    build:
      context: ./ai_features
      dockerfile: Dockerfile
    container_name: kitchenflow_ai
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./ai_features:/app
      - ai_models:/app/saved_models   # persists trained models across restarts
    env_file:
      - ./ai_features/.env
    depends_on:
      - postgres

  pgadmin:
    image: dpage/pgadmin4
    container_name: kitchenflow_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  ai_models:        # ← named volume for model persistence