version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: kitchenflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: kitchenflow_backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
    env_file:
      - ./backend/.env

  nginx:
    image: nginx:alpine
    container_name: kitchenflow_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    image: node:20-alpine
    container_name: kitchenflow_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend

volumes:
  postgres_data: